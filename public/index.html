<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Net Files</title>
    <style>
      .inputs > div {
        margin: 0.5rem;
      }
      .file-size::before {
        content: '(';
      }
      .file-size::after {
        content: ')';
      }
      .file {
        margin-bottom: 1rem;
      }
      h1 sub {
        font-size: 1rem;
      }
      code {
        display: inline-block;
        background-color: lightgray;
        padding: 0.2rem;
        border-radius: 0.2rem;
      }
    </style>
  </head>
  <body>
    <h1>
      net-files
      <sub>
        <a href="https://github.com/beenotung/net-files" target="_blank">
          git
        </a>
      </sub>
    </h1>
    <p>P2P file sharing.</p>
    <div class="inputs">
      <div>
        <label>
          slug:
          <input type="text" id="slugInput" />
        </label>
      </div>
      <div>
        <input
          type="file"
          id="fileInput"
          multiple
          onchange="updateFileList()"
        />
      </div>
      <div>
        <button onclick="share()">share</button>
        <button onclick="retrieve()">retrieve</button>
      </div>
    </div>
    <h2>File List</h2>
    <div id="fileList">
      <div class="file">
        <span class="file-name">sample.zip</span>
        <span class="file-size">1.5MB</span>
        <span class="seeding">(seeding)</span>
        <button class="download-button">download</button>
        <button class="remove-button">remove</button>
        <div class="remove-menu">
          <button class="remove-from-me-button">remove from me</button>
          <button class="remove-from-network-button">
            remove from network
          </button>
          <button class="cancel-remove-button">cancel removal</button>
        </div>
        <div class="progress-container">
          <div>
            <span class="received-size"></span>/<span class="total-size"></span>
          </div>
          <progress></progress>
        </div>
        <button class="save-button">save</button>
      </div>
    </div>
    <h2>About</h2>
    <p>
      Remark: the files are not stored on the server. The browser should be kept
      open when seeding files.
    </p>
    <p>
      Tips: you can share files among local network for faster transmission by
      running
      <code>npx net-files</code>
      in the terminal.
    </p>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      let socket = io()
      socket.connect()
      function autoSync() {
        if (slugInput.value) {
          if (fileInput.files.length > 0) {
            share()
          } else {
            retrieve()
          }
        }
      }
      slugInput.value = location.hash.replace('#', '') || slugInput.value
      slugInput.addEventListener('change', () => {
        location.hash = slugInput.value
        autoSync()
      })
      window.addEventListener('hashchange', () => {
        slugInput.value = location.hash.replace('#', '')
        autoSync()
      })
      autoSync()
      function updateFileList() {
        for (let node of fileList.children) {
          // check for receiving files
          if (node.buffer) continue
          // check for received files
          if (node.file) continue
          node.remove()
        }
        share()
      }
      function share() {
        let slug = slugInput.value
        if (!slug) {
          alert('please select a slug to serve as share key')
          return
        }
        socket.emit('join', slug)
        for (let file of fileInput.files) {
          seedFile(file)
        }
        for (let node of fileList.children) {
          let file = node.file
          if (file) {
            seedFile(file)
          }
        }
      }
      function seedFile(file) {
        let slug = slugInput.value
        console.log('seeding:', { slug, file })
        socket.emit('has', {
          slug,
          name: file.name,
          size: file.size,
          type: file.type,
          lastModified: file.lastModified,
        })
        file.readChunk = (offset, length) => {
          return new Promise(resolve => {
            let reader = new FileReader()
            reader.onload = () => {
              resolve(reader.result)
            }
            reader.onerror = () => {
              resolve(null)
            }
            let blob = file.slice(offset, offset + length)
            reader.readAsArrayBuffer(blob)
          })
        }
      }
      function retrieve() {
        let slug = slugInput.value
        if (!slug) {
          alert('please select a slug to serve as share key')
          return
        }
        socket.emit('join', slug)
      }
      let fileTemplate = fileList.children[0]
      fileTemplate.remove()
      socket.on('has', ({ slug, name, size, type, lastModified }) => {
        if (slug != slugInput.value) {
          socket.emit('leave', slug)
          return
        }
        let node = findFileNode({ name, size })
        if (node) {
          return
        }
        node = fileTemplate.cloneNode(true)
        node.dataset.name = name
        node.dataset.size = size
        node.querySelector('.file-name').textContent = name
        node.querySelector('.file-size').textContent = formatSize(size)
        let downloadButton = node.querySelector('.download-button')
        let removeButton = node.querySelector('.remove-button')
        let removeMenu = node.querySelector('.remove-menu')
        node.querySelector('.remove-from-me-button').onclick = () => {
          node.remove()
        }
        node.querySelector('.remove-from-network-button').onclick = () => {
          socket.emit('remove', { slug, name })
          node.remove()
        }
        removeMenu.hidden = true
        removeButton.onclick = () => {
          removeButton.hidden = true
          removeMenu.hidden = false
        }
        node.querySelector('.cancel-remove-button').onclick = () => {
          removeButton.hidden = false
          removeMenu.hidden = true
        }
        let saveButton = node.querySelector('.save-button')
        let progressContainer = node.querySelector('.progress-container')
        let receivedSizeSpan = node.querySelector('.received-size')
        let progressBar = node.querySelector('progress')
        node.querySelector('.total-size').textContent = formatSize(size)
        progressBar.max = size
        let seedingSpan = node.querySelector('.seeding')
        let file = findFile({ name, size })
        node.receivedSize = 0
        node.fileHandle = null
        node.writableStream = null
        node.lastWriteOffset = 0 // Track write position for streaming
        node.chunks = [] // Fallback: store chunks if File System Access API not available
        progressContainer.hidden = true
        downloadButton.hidden = !!file
        seedingSpan.hidden = !file
        // Show save button for files that are already available locally (seeding)
        if (file) {
          saveButton.hidden = false
          saveButton.disabled = false
          saveButton.onclick = () => {
            let url = URL.createObjectURL(file)
            let a = document.createElement('a')
            a.download = name
            a.href = url
            document.body.appendChild(a)
            a.click()
            setTimeout(() => {
              a.remove()
              URL.revokeObjectURL(url)
            })
          }
        } else {
          saveButton.hidden = true
        }
        // Helper function to clean up streams
        async function cleanupStreams() {
          if (node.writableStream) {
            try {
              await node.writableStream.close()
            } catch (err) {
              console.warn('Error closing existing stream:', err)
            }
            node.writableStream = null
          }
          node.fileHandle = null
          node.lastWriteOffset = 0
          node.chunks = null
        }

        // Helper function to setup File System API
        async function setupFileSystemAPI() {
          if (!('showSaveFilePicker' in window)) {
            return false
          }

          try {
            node.fileHandle = await window.showSaveFilePicker({
              suggestedName: name,
            })
            node.writableStream = await node.fileHandle.createWritable()
            node.lastWriteOffset = 0
            node.chunks = null
            console.log(
              `[File System API] Using File System Access API for streaming: ${name} (${formatSize(
                size,
              )})`,
            )
            return true
          } catch (err) {
            // User cancelled - abort download
            if (err.name === 'AbortError' || err.name === 'NotAllowedError') {
              console.log(
                `[Aborted] User cancelled file save dialog for: ${name}`,
              )
              node.downloadAborted = true
              progressContainer.hidden = true
              saveButton.hidden = true
              downloadButton.hidden = false
              return null // Signal abort
            }
            // Other error - fall back
            console.warn(
              '[Fallback Mode] File System Access API unavailable, using in-memory fallback:',
              err,
            )
            console.log(
              `[Fallback Mode] Will store chunks in memory: ${name} (${formatSize(
                size,
              )})`,
            )
            node.fileHandle = null
            node.writableStream = null
            node.chunks = []
            return false
          }
        }

        // Helper function to setup fallback mode
        function setupFallbackMode() {
          console.log(
            `[Fallback Mode] File System Access API not supported in this browser: ${name} (${formatSize(
              size,
            )})`,
          )
          if (size > 500e6) {
            alert(
              'Large file detected. File System Access API not supported in this browser. Download may fail for files larger than available RAM.',
            )
          }
          node.chunks = []
        }

        downloadButton.onclick = async () => {
          progressContainer.hidden = false
          saveButton.hidden = false
          saveButton.disabled = true
          node.downloadAborted = false

          await cleanupStreams()

          // Try to setup File System API, or fall back to memory
          const fsApiAvailable = 'showSaveFilePicker' in window
          const fsApiResult = fsApiAvailable
            ? await setupFileSystemAPI()
            : false

          // Handle abort
          if (fsApiResult === null) {
            return
          }

          // Setup fallback if File System API not available or failed
          if (!fsApiResult) {
            setupFallbackMode()
          }

          // Start download
          node.receivedSize = 0
          socket.emit('want', { slug, name, size, offset: node.receivedSize })
          receivedSizeSpan.textContent = formatSize(node.receivedSize)
        }
        // Helper function to switch from stream to memory fallback
        async function switchToMemoryFallback() {
          if (node.writableStream) {
            try {
              await node.writableStream.close()
            } catch (err) {
              console.error('Error closing stream:', err)
            }
            node.writableStream = null
            node.fileHandle = null
          }
          if (!node.chunks) node.chunks = []
        }

        // Helper function to write chunk to File System API
        async function writeToStream(src, offset) {
          if (offset !== node.lastWriteOffset) {
            console.warn(
              '[Fallback Mode] Out of order chunk detected, falling back to in-memory storage',
            )
            console.log(
              `[Fallback Mode] Switching to in-memory chunks for: ${name}`,
            )
            await switchToMemoryFallback()
            return false
          }
          await node.writableStream.write(src)
          node.lastWriteOffset = offset + src.length
          return true
        }

        // Helper function to store chunk in memory
        function storeInMemory(src, offset) {
          if (!node.chunks) node.chunks = []
          node.chunks.push({ offset, buffer: src.buffer.slice() })
        }

        // Helper function to create save button handler
        function createSaveButtonHandler(fileSource) {
          if (node.fileHandle) {
            // File System API - read from disk handle
            return async () => {
              try {
                const file = await node.fileHandle.getFile()
                downloadFile(file)
              } catch (err) {
                console.error('Error accessing file:', err)
                alert(
                  'Error accessing saved file. It may have been moved or deleted.',
                )
              }
            }
          } else {
            // Memory fallback - use file directly
            return () => downloadFile(fileSource)
          }
        }

        function downloadFile(file) {
          const url = URL.createObjectURL(file)
          const a = document.createElement('a')
          a.download = name
          a.href = url
          document.body.appendChild(a)
          a.click()
          setTimeout(() => {
            a.remove()
            URL.revokeObjectURL(url)
          })
        }

        // Helper function to complete download
        async function completeDownload() {
          console.log('downloaded:', { slug, name, size })
          let file

          if (node.writableStream) {
            // File System API completion
            await node.writableStream.close()
            node.writableStream = null
            const fileData = await node.fileHandle.getFile()
            file = fileData
            console.log(
              `[File System API] Download completed using File System Access API: ${name}`,
            )
          } else if (node.chunks?.length > 0) {
            // Memory fallback completion
            console.log(
              `[Fallback Mode] Reconstructing file from chunks in memory: ${name} (${node.chunks.length} chunks)`,
            )
            node.chunks.sort((a, b) => a.offset - b.offset)
            const fileBlob = new Blob(
              node.chunks.map(chunk => chunk.buffer),
              { type },
            )
            file = new File([fileBlob], name, { type, lastModified })
            node.chunks = null
            console.log(
              `[Fallback Mode] Download completed using in-memory fallback: ${name}`,
            )
          } else {
            return // No file to complete
          }

          node.file = file
          seedFile(file)
          downloadButton.hidden = true
          seedingSpan.hidden = false
          saveButton.disabled = false
          saveButton.onclick = createSaveButtonHandler(file)
        }

        node.onContent = async ({ offset, buffer }) => {
          if (node.downloadAborted) {
            console.log(
              `[Aborted] Ignoring chunk for aborted download: ${name}`,
            )
            return
          }

          const src = new Uint8Array(buffer)
          node.receivedSize = offset + src.length
          progressBar.value = node.receivedSize
          receivedSizeSpan.textContent = formatSize(node.receivedSize)

          // Write chunk to appropriate storage
          if (node.writableStream) {
            try {
              await writeToStream(src, offset)
            } catch (err) {
              console.error('[Fallback Mode] Error writing chunk:', err)
              console.log(
                `[Fallback Mode] Switching to in-memory chunks due to error for: ${name}`,
              )
              await switchToMemoryFallback()
            }
          }

          // Store in memory if not using stream or if stream failed
          if (!node.writableStream && node.chunks) {
            storeInMemory(src, offset)
          }

          // Request next chunk if download is in progress
          const hasMore = src.length > 0 && node.receivedSize < size
          if (hasMore && !node.downloadAborted) {
            socket.emit('want', { slug, name, size, offset: node.receivedSize })
            return
          }

          // Complete download if finished
          if (node.receivedSize >= size && !node.downloadAborted) {
            await completeDownload()
          }
        }
        fileList.appendChild(node)
      })

      socket.on('want', async ({ slug, name, size, offset }) => {
        if (slug != slugInput.value) {
          socket.emit('leave', slug)
          return
        }
        let file = findFile({ name, size })
        if (!file) return
        let bufferSize = 200e3
        let arrayBuffer = await file.readChunk(offset, bufferSize)
        if (!arrayBuffer) {
          // Error reading chunk, send empty buffer to signal end
          socket.emit('content', {
            slug,
            name,
            size,
            offset,
            buffer: new ArrayBuffer(0),
          })
          return
        }
        let buffer = new Uint8Array(arrayBuffer)
        socket.emit('content', { slug, name, size, offset, buffer })
      })
      socket.on('content', ({ slug, name, size, offset, buffer }) => {
        if (slug != slugInput.value) {
          socket.emit('leave', slug)
          return
        }
        let file = findFile({ name, size })
        if (file) return
        let node = findFileNode({ name, size })
        if (!node) return
        node.onContent({ offset, buffer })
      })
      function findFile({ name, size }) {
        for (let file of fileInput.files) {
          if (file.name == name && file.size == size) return file
        }
        return findFileNode({ name, size })?.file
      }
      function findFileNode({ name, size }) {
        for (let node of fileList.children) {
          if (node.dataset.name == name && node.dataset.size == size) {
            return node
          }
        }
      }
      function formatSize(size) {
        if (size < 1e3) return size + 'B'
        if (size < 1e6) return (size / 1e3).toFixed(2) + 'KB'
        if (size < 1e9) return (size / 1e6).toFixed(2) + 'MB'
        return (size / 1e9).toFixed(2) + 'GB'
      }
    </script>
  </body>
</html>
